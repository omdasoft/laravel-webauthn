# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
    # Only update direct dependencies — transitive bumps are handled by composer update
    allow:
      - dependency-type: "direct"
    # Never auto-propose major version bumps — those require manual review
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
