name: Feature Request
description: Suggest a new feature or improvement for the package
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to suggest a feature! Please fill in as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A clear description of the problem or limitation you are facing.
      placeholder: "I'm trying to do X but the package doesn't support it because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you would like to see and how it would work.
      placeholder: "I'd like to be able to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or alternative approaches?
      placeholder: "I tried... but it didn't work because..."
    validations:
      required: false

  - type: input
    id: package-version
    attributes:
      label: Package Version
      description: Which version of the package are you using?
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: willing-to-pr
    attributes:
      label: Are you willing to submit a PR for this feature?
      options:
        - "Yes"
        - "No"
        - "Maybe, with some guidance"
    validations:
      required: true
